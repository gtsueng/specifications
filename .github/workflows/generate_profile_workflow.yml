# This workflow will generate/update a/the profile HTML page each time the 
# DDE genrates and update a JSON-LD in the _data/specifications folder (repo) 

name: generate-profile
  
on:
  push:
    branches:
      - master
#  pull_request:
#    types: [opened, reopened]

env:
  GH_TOKEN: ${{ secrets.BS_GH_TOKEN }}

# inputs:
#   branch-name: 
#     description: $`date +%Y_%m_%d-%H_%M_%S`
#     required: true

jobs:
  generate-profile:
    runs-on: ubuntu-latest

    steps: 

      - name: Verify token works
        env:
          GH_TOKEN: ${{ secrets.BS_GH_TOKEN }}
        run: |
          gh api user
          
      - name: Checkout Spec Repo and Retreive the Preceding Commit
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Get Changed Files
        id: changed-files
        uses: tj-actions/changed-files@v21

      - name: List Changed Files
        run: |
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            echo "$file was changed"
          done

      - name: Setup Python 3.8
        uses: actions/setup-python@v2
        with:
          python-version: 3.8 #install the python needed

      - name: Install Python dependencies
        uses: py-actions/py-dependency-install@v3
        with:
          path: "./.github/workflows/requirements.txt"

      - name: Checkout the DDE repo
        env:
          GITHUB_TOKEN: ${{ secrets.BS_GH_TOKEN }}
        run: | 
          git clone https://user:$GITHUB_TOKEN@github.com/BioSchemas/bioschemas-dde
          cd bioschemas-dde 
          git checkout main
          ls

      - name: Checkout the Website repo
        env:
          GITHUB_TOKEN: ${{ secrets.BS_GH_TOKEN }}
        run: | 
          git clone https://user:$GITHUB_TOKEN@github.com/BioSchemas/bioschemas.github.io
          cd bioschemas.github.io
          git pull
          ls

      - name: Checkout a new branch - Website repository
        env:
          GITHUB_TOKEN: ${{ secrets.BS_GH_TOKEN }}
        run: |
          cd bioschemas.github.io
          git pull
          BRANCH_NAME=`date +%Y_%m_%d-%H_%M`
          git checkout -b $BRANCH_NAME
          echo "WEBSITE_BRANCH=$BRANCH_NAME" >> $GITHUB_ENV
          cd ..

      - name: Execute the config files update Python Script
        run: |
          python ./.github/workflows/config_file_update_script.py ${{steps.changed-files.outputs.all_changed_files}}

      - name: Execute the profile rendering Python Script
        run: |
          python ./.github/workflows/profile_generation_script.py ${{steps.changed-files.outputs.all_changed_files}} bioschemas.github.io
      
      - name: Commit and Push the changes in the website
        env:
          GITHUB_TOKEN: ${{ secrets.BS_GH_TOKEN }}
        run: |
          cd bioschemas.github.io
          git remote set-url origin https://x-access-token:$GITHUB_TOKEN@github.com/BioSchemas/bioschemas.github.io.git
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git status
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit, skipping push."
            echo "CHANGES_PUSHED=false" >> $GITHUB_ENV
          else
            git commit -m "Updating Profile"
            git push --set-upstream -u origin $WEBSITE_BRANCH
            echo "CHANGES_PUSHED=true" >> $GITHUB_ENV
          fi

      - name: Create a pull request
        if: env.CHANGES_PUSHED == 'true'
        env:
          GH_TOKEN: ${{ secrets.BS_GH_TOKEN }}
        run: |
          cd bioschemas.github.io
          gh pr create \
            --repo BioSchemas/bioschemas.github.io \
            --title "Auto-Rendering Profile" \
            --head $WEBSITE_BRANCH \
            --base master \
            --body "This pull request has been created by a github action, after adding/updating a profile in the specifications repo."
      
      - name: Commit and Push the changes in the DDE repository
        env:
          GITHUB_TOKEN: ${{ secrets.BS_GH_TOKEN }}
        run: |
          cd bioschemas-dde
          git remote set-url origin https://x-access-token:$GITHUB_TOKEN@github.com/BioSchemas/bioschemas-dde.git
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git status
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit, skipping push."
          else
            git commit -m "Updating Profile"
            git push origin -f main
          fi

      - name: End Workflow
        run: |
          echo "Check the Website !"
